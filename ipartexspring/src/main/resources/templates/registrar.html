<!DOCTYPE html>
<html th:replace="~{_global :: plantilla(~{::title}, ~{::main})}"
	xmlns:th="https://www.thymeleaf.org"
	xmlns:sec="https://www.thymeleaf.org/">
<title>IparteX: Registro</title>

<main>
	<form action="login.html" th:action="@{/registrar-post}"
		th:method="post" th:object="${usuario}" class="needs-validation"
		novalidate>

		<div class="row mb-3">
			<label for="nombre" class="col-sm-2 col-form-label">Nombre</label>
			<div class="col-sm">
				<input type="text" required="required" maxlength="20"
					class="form-control" th:errorclass="is-invalid"
					th:field="*{nombre}" />
				<div class="invalid-feedback">El nombre es obligatorio y debe
					tener como máximo 20 caracteres</div>
			</div>
		</div>
		<div class="row mb-3">
			<label for="email" class="col-sm-2 col-form-label">Correo
				electrónico</label>
			<div class="col-sm">
				<input type="email" required="required" maxlength="255"
					class="form-control" th:errorclass="is-invalid" th:field="*{email}" />
				<div class="invalid-feedback">El correo electrónico debe estar
					rellenado y ser válido y tener como máximo 255 caracteres</div>
			</div>
		</div>
		<div class="row mb-3">
			<label for="password" class="col-sm-2 col-form-label">Contraseña</label>
			<div class="col-sm">
				<input type="password" required="required" maxlength="100"
					class="form-control" th:errorclass="is-invalid"
					th:field="*{password}" />
				<div class="invalid-feedback">La contraseña es obligatoria y
					tener como máximo 100 caracteres</div>
			</div>
		</div>

		<div class="row mb-3">
			<div class="offset-sm-2 col-sm">
				<button class="btn btn-primary">Registrarse</button>
				<ul class="mt-3">
					<li th:each="e : ${errores}" class="text-danger"><strong
						th:text="${e.key}"></strong> <span th:text="${e.value}"></span></li>
				</ul>

			</div>
		</div>

	</form>

</main>

</html>
