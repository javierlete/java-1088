<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/">
<head>
<meta charset="UTF-8">
<title>IparteX</title>
</head>
<body>

<h1>Ipartex</h1>

<ul>
	<li sec:authorize="!isAuthenticated()">
		<a href="login.html" th:href="@{/login}">Login</a>
	</li>
	<li sec:authorize="!isAuthenticated()">
		<a href="registrar.html" th:href="@{/registrar}">Registrarse</a>
	</li>
	<li sec:authorize="isAuthenticated()">
		<form th:action="@{/logout}" th:method="post">
			<button>Cerrar sesión</button>
		</form>
	<li sec:authorize="isAuthenticated()" sec:authentication="name">Pepillo</li>	
</ul>

<form sec:authorize="isAuthenticated()" th:action="@{/usuario/nuevo-mensaje}" th:method="post">
	<textarea name="texto" placeholder="Mensaje nuevo"></textarea>
	<button>Enviar mensaje</button>
</form>

<ul>
	<li th:each="mensaje: ${mensajes}">
		<p th:text="${mensaje.usuario.nombre}">Javier</p>
		<p th:text="${mensaje.fechaHora}">13/03/2026 9:13</p>
		<p th:text="${mensaje.texto}">flñajksdñ glkha sñdlgj ñalskdhg ñlaskdj fñlashd gñlkaj sdñflj asñdlkgh ñlash dg</p>
	</li>
</ul>

</body>
</html>
