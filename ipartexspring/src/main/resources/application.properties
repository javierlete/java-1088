spring.application.name=ipartexspring

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/ipartexspring
spring.datasource.username=root
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

spring.data.rest.base-path=/api/v1

springdoc.swagger-ui.path=/api/swagger
springdoc.api-docs.path=/api/apidocs/v3

spring.mvc.view.prefix=/WEB-INF/vistas/
spring.mvc.view.suffix=.jsp
