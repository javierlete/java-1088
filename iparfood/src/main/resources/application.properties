spring.application.name=iparfood

server.port=${PORT:8080}

spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:iparfood}?sslMode=REQUIRED&allowPublicKeyRetrieval=true&useSSL=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:1234}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.data.rest.base-path=/api/v1

spring.jackson.deserialization.fail-on-trailing-tokens=false

# springdoc.swagger-ui.path=/api/swagger
# springdoc.api-docs.path=/api/apidocs/v3

# springdoc.api-docs.enabled=true
# scalar.enabled=true
# springdoc.swagger-ui.enabled=true

# spring.mvc.view.prefix=/WEB-INF/vistas/
# spring.mvc.view.suffix=.jsp

spring.devtools.livereload.enabled=true

# logging.level.root=error

logging.level.com.ipartek.formacion.ejemplos.iparfood=trace

# 1. Define el formato de la cabecera (sin el guion por defecto)
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(%-5level) %clr([%thread]){magenta} %clr(%logger{36}){cyan}.%clr(%M){yellow} : %n%m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}

# 2. Desactiva explícitamente el prefijo de excepción que a veces añade el guion
logging.exception-conversion-word=%wEx
