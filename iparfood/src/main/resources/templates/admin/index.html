<!DOCTYPE html>
<html th:replace="~{_global :: plantilla(~{::title}, ~{::main})}"
	xmlns:th="https://www.thymeleaf.org"
	xmlns:sec="https://www.thymeleaf.org/" lang="es">

<title>IparFood: Administración</title>

<main>
	<h1>Administración</h1>

	<table class="table table-hover table-striped table-bordered">
		<thead class="table-secondary">
			<tr>
				<th scope="col">Id</th>
				<th scope="col">Nombre</th>
				<th scope="col">Precio</th>
				<th scope="col">Tipo</th>
				<th scope="col">OPCIONES</th>
			</tr>
		</thead>

		<tbody>
			<tr th:each="plato: ${platos}" th:object="${plato}">
				<th scope="row" th:text="*{id}">1</th>
				<td th:text="*{nombre}">Un plato</td>
				<td th:text="*{precio}">12,12 €</td>
				<td th:text="*{tipoComida.nombre}">Mediterranea</td>
				<td><a class="btn btn-primary btn-sm" href="#" th:href="@{/admin/platos/formulario(id=*{id})}"><i
						class="bi bi-pencil-fill"></i></a><a class="btn btn-danger btn-sm" href="#" th:href="@{/admin/platos/borrar(id=*{id})}"><i
						class="bi bi-trash-fill"></i></a></td>
			</tr>
		</tbody>

		<tfoot class="table-secondary">
			<tr>
				<td colspan="4"></td>
				<td><a class="btn btn-primary btn-sm" href="#" th:href="@{/admin/platos/formulario}"><i
						class="bi bi-plus-lg"></i></a></td>
			</tr>
		</tfoot>
	</table>
</main>

</html>
