<div>
    <p>{{pedido.usuario.nombre}}</p>
    <p></p>
</div>

<div></div>

<table class="table">
    <thead class="table-secondary">
        <tr>
            <th>Plato</th>
            <th class="text-end">Precio</th>
        </tr>
    </thead>
    <tbody>
        @for(plato of pedido.platos; track plato.id) {
        <tr>
            <td>{{plato.nombre}}</td>
            <td class="text-end">{{plato.precio | currency}}</td>
        </tr>
        }
    </tbody>
    <tfoot class="table-secondary">
        <tr>
            <td class="fw-bold">Total</td>
            <td class="text-end fw-bold">{{pedidoService.total | currency}}</td>
        </tr>
    </tfoot>
</table>

<div class="d-flex justify-content-between">
    <a class="btn btn-outline-primary" routerLink="/">Volver</a>
    <button class="btn btn-primary">Confirmar pedido</button>
</div>
