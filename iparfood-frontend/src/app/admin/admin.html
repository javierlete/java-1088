<table class="table table-hover table-striped table-bordered">
    <thead class="table-secondary">
        <tr>
            <th scope="col" class="text-end">Id</th>
            <th scope="col">Nombre</th>
            <th scope="col" class="text-end">Precio</th>
            <th scope="col">Tipo</th>
            <th scope="col" class="text-center">OPCIONES</th>
        </tr>
    </thead>
    <tbody>
        @for(plato of platos(); track plato.id) {
        <tr>
            <th class="text-end" scope="row">{{plato.id}}</th>
            <td>{{plato.nombre}}</td>
            <td class="text-end">{{plato.precio | currency}}</td>
            <td>{{plato.tipoComida.nombre}}</td>
            <td class="d-flex justify-content-around">
                <a routerLink="/admin/plato/{{plato.id}}" class="btn btn-sm btn-primary"><i class="bi bi-pencil-fill"></i></a>
                <a (click)="borrar(plato.id)" class="btn btn-sm btn-danger"><i class="bi bi-trash-fill"></i></a>
            </td>
        </tr>
        }
    </tbody>
    <tfoot class="table-secondary">
        <tr>
            <td colspan="4"></td>
            <td class="text-center">
                <a routerLink="/admin/plato" class="btn btn-sm btn-primary"><i class="bi bi-plus-lg"></i></a>
            </td>
        </tr>
    </tfoot>
</table>
