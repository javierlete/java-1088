<p>{{plato | json}}</p>

<form>
    <div class="row mb-3">
        <label for="nombre" class="col-sm-2 col-form-label">Nombre</label>
        <div class="col-sm">
            <input type="text" class="form-control" [(ngModel)]="plato.nombre" name="nombre" id="nombre">
        </div>
    </div>
    <div class="row mb-3">
        <label for="precio" class="col-sm-2 col-form-label">Precio</label>
        <div class="col-sm">
            <input type="number" step=".01" class="form-control" [(ngModel)]="plato.precio" name="precio" id="precio">
        </div>
    </div>
    <div class="row mb-3">
        <label for="descripcion" class="col-sm-2 col-form-label">Descripción</label>
        <div class="col-sm">
            <textarea class="form-control" id="descripcion" [(ngModel)]="plato.descripcion" name="descripcion"
                id="descripcion"></textarea>
        </div>
    </div>
    <div class="row mb-3">
        <label for="tipo-comida" class="col-sm-2 col-form-label">Tipo de comida</label>
        <div class="col-sm">
            <select class="form-select" [(ngModel)]="plato.tipoComida.id" name="tipo-comida" id="tipo-comida">
                <option value="0">Selecciona un tipo de comida</option>
                @for(tipo of tiposComida(); track tipo.id) {
                <option value="{{tipo.id}}">{{tipo.nombre}}</option>
                }
            </select>
        </div>
    </div>
    <div class="row mb-3">
        <div class="offset-sm-2 col-sm">
            <button (click)="guardar()" type="submit" class="btn btn-primary">Guardar</button>
        </div>
    </div>
</form>
