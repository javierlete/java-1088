@if(errorLogin || cierreSesion) {
<div th:if="${param.logout}" class="alert alert-{{errorLogin ? 'danger':  'success'}} alert-dismissible fade show"
    role="alert">
    {{errorLogin ? 'Error de login' : 'Cierre de sesión correcto'}}
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>
}

<form (submit)="envioFormulario()">
    <div class="row mb-3">
        <label for="email" class="col-sm-2 col-form-label">Email</label>
        <div class="col-sm">
            <input [(ngModel)]="usuario.email" name="email" type="email" class="form-control">
        </div>
    </div>
    <div class="row mb-3">
        <label for="password" class="col-sm-2 col-form-label">Contraseña</label>
        <div class="col-sm">
            <input [(ngModel)]="usuario.password" name="password" type="password" class="form-control">
        </div>
    </div>
    <div class="row mb-3">
        <div class="offset-sm-2 col-sm">
            <button class="btn btn-primary">Iniciar sesión</button>
        </div>
    </div>
</form>
