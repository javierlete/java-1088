<table>
    <thead>
        <tr>
            <th scope="col">Id</th>
            <th scope="col">Nombre</th>
            <th scope="col">Precio</th>
            <th scope="col">OPCIONES</th>
        </tr>
    </thead>

    <tbody>
        @for(producto of productos; track producto.id) {
        <tr>
            <th scope="row">{{producto.id}}</th>
            <td>{{producto.nombre}}</td>
            <td>{{producto.precio | currency }}</td>
            <td>
                <a routerLink="formulario/{{producto.id}}">Editar</a>&nbsp;
                <button (click)="borrar(producto.id)">Borrar</button>
            </td>
        </tr>
        }
    </tbody>

    <tfoot>
        <tr>
            <td colspan="3"></td>
            <td>
                <a routerLink="formulario">Añadir</a>
            </td>
        </tr>
    </tfoot>
</table>
