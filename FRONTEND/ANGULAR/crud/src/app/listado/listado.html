<table class="table table-hover table-striped table-bordered">
    <thead class="table-secondary">
        <tr>
            <th class="text-end" scope="col">Id</th>
            <th scope="col">Nombre</th>
            <th class="text-end" scope="col">Precio</th>
            <th scope="col">OPCIONES</th>
        </tr>
    </thead>

    <tbody>
        @for(producto of productos; track producto.id) {
        <tr>
            <th class="text-end" scope="row">{{producto.id}}</th>
            <td>{{producto.nombre}}</td>
            <td class="text-end">{{producto.precio | currency }}</td>
            <td>
                <i-boton etiqueta="pencil-fill" [icono]="true" tamanyo="sm" vinculo="formulario/{{producto.id}}" />
                <i-boton etiqueta="trash-fill" [icono]="true" tipo="danger" tamanyo="sm" (pulsado)="borrar(producto.id)" />
            </td>
        </tr>
        }
    </tbody>

    <tfoot class="table-secondary">
        <tr>
            <td colspan="3"></td>
            <td>
                <i-boton vinculo="formulario" etiqueta="plus-lg" tamanyo="sm" [icono]="true" />
            </td>
        </tr>
    </tfoot>
</table>
